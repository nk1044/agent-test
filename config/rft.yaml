# Rejection Sampling Fine-Tuning (RFT) Configuration
# Generates N solutions per problem, keeps execution-verified ones, then SFTs again.
# Run after SFT: python train.py --stages rft
stage: rft

train_file: "./data/processed/sft_train.jsonl"
verified_data_path: "./data/processed/rft_verified.jsonl"
run_sft_on_verified: true

# Solution generation
generation:
  n_candidates: 16           # solutions sampled per problem
  batch_size: 4              # concurrent generations per GPU forward pass
  max_new_tokens: 2048
  temperature: 0.9
  top_p: 0.95

# Training on verified solutions
training:
  output_dir: "./outputs/rft"
  sft_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  seed: 42
  report_to: ["wandb", "tensorboard"]
  run_name: "cp-llm-rft"

# Sandbox
sandbox:
  timeout_seconds: 10.0

deepspeed_config: "./config/ds_zero2.json"
