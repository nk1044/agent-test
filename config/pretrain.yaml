# Continued Pretraining Configuration
stage: pretrain

# Model
base_model: "deepseek-ai/deepseek-coder-1.3b-base"  # override via BASE_MODEL env var

# Data
data:
  processed_dir: "./data/processed"
  train_file: "train.jsonl"
  val_file: "val.jsonl"
  max_seq_length: 4096
  text_field: "text"

# Training hyperparameters
training:
  output_dir: "./outputs/pretrain"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  logging_steps: 20
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  evaluation_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: ["wandb", "tensorboard"]
  run_name: "cp-llm-pretrain"
  seed: 42
  resume_from_checkpoint: null  # set to checkpoint path to resume

# Packing (combine short sequences for efficiency)
packing: true
packing_max_seq_length: 4096

# DeepSpeed config (null = use accelerate defaults)
deepspeed_config: "./config/ds_zero2.json"
