# Supervised Fine-Tuning Configuration
stage: sft

# Model — start from pretrained checkpoint or base model
base_model: "./outputs/pretrain/best_model"  # or original base model
# base_model: "Qwen/Qwen2.5-Coder-7B"

# Data
data:
  processed_dir: "./data/processed"
  train_file: "sft_train.jsonl"
  val_file: "sft_val.jsonl"
  max_seq_length: 8192
  prompt_field: "prompt"
  response_field: "response"
  # Mask loss on prompt tokens (only learn to generate the solution)
  train_on_prompt: false

# Prompt template
prompt_template: |
  ### Competitive Programming Problem

  {problem}

  ### Examples
  {examples}

  ### Solution
  ```{language}

response_template: "### Solution\n```"

# Training hyperparameters
training:
  output_dir: "./outputs/sft"
  num_train_epochs: 5
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  logging_steps: 10
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  evaluation_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: ["wandb", "tensorboard"]
  run_name: "cp-llm-sft"
  seed: 42
  resume_from_checkpoint: null

# Packing for SFT (disabled by default since we mask prompt)
packing: false

deepspeed_config: "./config/ds_zero2.json"
