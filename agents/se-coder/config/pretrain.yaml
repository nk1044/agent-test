# Continued Pretraining Configuration — Software Engineering Specialist
stage: pretrain

# Base model — best balance of code and language for SE tasks
base_model: "Qwen/Qwen2.5-Coder-7B"

# Data
data:
  processed_dir: "./data/processed"
  train_file: "pretrain_train.jsonl"
  val_file: "pretrain_val.jsonl"
  max_seq_length: 8192
  text_field: "text"

# Training hyperparameters
training:
  output_dir: "./outputs/pretrain"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  logging_steps: 20
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  evaluation_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  report_to: ["wandb", "tensorboard"]
  run_name: "se-llm-pretrain"
  seed: 42

packing: true
packing_max_seq_length: 8192

deepspeed_config: "./config/ds_zero2.json"
